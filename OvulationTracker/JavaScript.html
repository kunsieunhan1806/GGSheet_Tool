<script>
(function () {
  'use strict';

  let state = { records: [], forecast: null };
  let viewMode = loadViewMode();
  const calCursor = new Date();
  calCursor.setDate(1);

  const $ = selector => document.querySelector(selector);
  const $$ = selector => document.querySelectorAll(selector);

  function loadViewMode() {
    try {
      return localStorage.getItem('cycleViewMode') === 'ttc' ? 'ttc' : 'track';
    } catch (err) {
      return 'track';
    }
  }

  function saveViewMode(mode) {
    try {
      localStorage.setItem('cycleViewMode', mode);
    } catch (err) {
      // localStorage có thể bị chặn trong một số iframe.
    }
  }

  function applyMode() {
    document.body.dataset.mode = viewMode;
    $$('.mode-btn').forEach(button => {
      const active = button.dataset.mode === viewMode;
      button.classList.toggle('active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function showOverlay(show) {
    const overlay = $('#overlay');
    overlay.classList.toggle('hidden', !show);
    overlay.setAttribute('aria-hidden', show ? 'false' : 'true');
  }

  function switchPanel(panelName) {
    $$('.mobile-nav [data-tab]').forEach(button => {
      const active = button.dataset.tab === panelName;
      button.classList.toggle('active', active);
      button.setAttribute('aria-current', active ? 'page' : 'false');
    });

    $$('.panel[data-panel]').forEach(panel => {
      panel.classList.toggle('hidden', panel.dataset.panel !== panelName);
    });

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  }

  function setSaving(isSaving) {
    const saveButton = $('#btn-save');
    saveButton.disabled = isSaving;
    saveButton.setAttribute('aria-busy', isSaving ? 'true' : 'false');
    saveButton.textContent = isSaving ? 'Đang lưu…' : 'Lưu kỳ kinh';
  }

  function showFormMessage(text, type) {
    const message = $('#form-msg');
    message.textContent = text;
    message.className = 'msg ' + type;
    message.classList.remove('hidden');
  }

  function applyData(data, onSuccess) {
    try {
      state = data || { records: [], forecast: null };
      state.records = Array.isArray(state.records) ? state.records : [];
      render();
      if (onSuccess) onSuccess();
    } catch (err) {
      console.error('Render error:', err);
      showFormMessage('⚠ Lỗi hiển thị: ' + (err && err.message ? err.message : err), 'error');
    } finally {
      showOverlay(false);
    }
  }

  function handleFailure(err) {
    showOverlay(false);
    setSaving(false);
    const text = 'Không thể tải dữ liệu: ' + (err && err.message ? err.message : String(err));
    const formVisible = window.innerWidth >= 768 || !$('#panel-form').classList.contains('hidden');
    if (formVisible) {
      showFormMessage(text, 'error');
    } else {
      alert(text);
    }
  }

  function parseDate(iso) {
    if (!iso) return null;
    const match = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return null;
    const date = new Date(+match[1], +match[2] - 1, +match[3]);
    return Number.isNaN(date.getTime()) ? null : date;
  }

  function fmtShort(iso) {
    const date = parseDate(iso);
    if (!date) return '—';
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    return day + '/' + month + '/' + date.getFullYear();
  }

  function daysFromToday(iso) {
    const date = parseDate(iso);
    if (!date) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((date - today) / 86400000);
  }

  function countdownText(iso, label) {
    const days = daysFromToday(iso);
    if (days === null) return '';
    if (days === 0) return label + ' hôm nay';
    if (days > 0) return 'Còn ' + days + ' ngày';
    return 'Đã qua ' + (-days) + ' ngày';
  }

  function daysBetween(a, b) {
    if (!a || !b) return null;
    const first = new Date(a.getFullYear(), a.getMonth(), a.getDate());
    const second = new Date(b.getFullYear(), b.getMonth(), b.getDate());
    return Math.round((first - second) / 86400000);
  }

  function isSameDate(a, b) {
    return a && b
      && a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
  }

  function isBetween(date, start, end) {
    return Boolean(date && start && end && date >= start && date <= end);
  }

  function appendMetaItem(container, label, value) {
    const item = document.createElement('span');
    const strong = document.createElement('strong');
    item.append(document.createTextNode(label + ' '));
    strong.textContent = value;
    item.appendChild(strong);
    container.appendChild(item);
  }

  function renderSampleNote(forecast) {
    const note = $('#f-sample-note');
    const sampleCount = document.createElement('b');
    sampleCount.id = 'f-samples';
    sampleCount.textContent = forecast.cycleSamples;

    note.replaceChildren(document.createTextNode('Dựa trên '), sampleCount);
    if (forecast.rawCycleCount && forecast.outlierCount) {
      note.append(document.createTextNode('/' + forecast.rawCycleCount + ' chu kỳ dùng để dự báo'));
    } else {
      note.append(document.createTextNode(' chu kỳ đã ghi nhận'));
    }
  }

  $$('.mobile-nav [data-tab]').forEach(button => {
    button.addEventListener('click', () => switchPanel(button.dataset.tab));
  });

  $$('[data-go-to]').forEach(button => {
    button.addEventListener('click', () => switchPanel(button.dataset.goTo));
  });

  $$('.mode-btn').forEach(button => {
    button.addEventListener('click', () => {
      viewMode = button.dataset.mode === 'ttc' ? 'ttc' : 'track';
      saveViewMode(viewMode);
      applyMode();
      renderForecast();
    });
  });

  function load() {
    showOverlay(true);
    google.script.run
      .withSuccessHandler(data => applyData(data))
      .withFailureHandler(handleFailure)
      .getCycleData();
  }

  function render() {
    applyMode();
    renderForecast();
    renderCalendar();
    renderCycleChart();
    renderHistory();
  }

  function renderForecast() {
    const forecast = state.forecast;
    if (!forecast) {
      $('#forecast-empty').classList.remove('hidden');
      $('#forecast-body').classList.add('hidden');
      $('#mini-cal').classList.add('hidden');
      return;
    }

    $('#forecast-empty').classList.add('hidden');
    $('#forecast-body').classList.remove('hidden');
    $('#mini-cal').classList.remove('hidden');
    renderModeCard(forecast);

    if (forecast.isIrregular) {
      $('#irregular-warning').classList.remove('hidden');
      $('#warn-spread').textContent = forecast.spread;
    } else {
      $('#irregular-warning').classList.add('hidden');
    }

    $('#f-next-min').textContent = fmtShort(forecast.nextPeriodEarliest);
    $('#f-next-likely').textContent = fmtShort(forecast.nextPeriodLikely);
    $('#f-next-max').textContent = fmtShort(forecast.nextPeriodLatest);
    $('#f-next-count').textContent = countdownText(forecast.nextPeriodLikely, 'Bắt đầu');

    $('#f-ov-min').textContent = fmtShort(forecast.ovulationEarliest);
    $('#f-ov-likely').textContent = fmtShort(forecast.ovulationLikely);
    $('#f-ov-max').textContent = fmtShort(forecast.ovulationLatest);
    $('#f-ov-count').textContent = countdownText(forecast.ovulationLikely, 'Rụng trứng');

    $('#f-fertile-likely').textContent = fmtShort(forecast.fertileLikelyStart) + ' → ' + fmtShort(forecast.fertileLikelyEnd);
    $('#f-fertile-full').textContent = fmtShort(forecast.fertileStart) + ' → ' + fmtShort(forecast.fertileEnd);
    $('#f-fertile-peak').textContent = fmtShort(forecast.fertilePeakStart) + ' → ' + fmtShort(forecast.fertilePeakEnd);
    renderFertileStatus(forecast);

    $('#f-cycle-min').textContent = forecast.minCycle;
    $('#f-cycle-median').textContent = forecast.likelyCycle;
    $('#f-cycle-max').textContent = forecast.maxCycle;
    $('#f-confidence').textContent = 'Độ tin cậy: ' + (forecast.confidenceLabel || '—');
    $('#f-confidence').className = 'confidence-pill confidence-' + (forecast.confidence || 'low');
    renderSampleNote(forecast);

    const notes = [];
    if (forecast.rawCycleCount && forecast.outlierCount) {
      notes.push('Đã bỏ qua ' + forecast.outlierCount + ' chu kỳ bất thường khi tính min/median/max. Biểu đồ đánh dấu các chu kỳ này bằng viền gạch.');
    }
    if (forecast.confidenceNote) notes.push(forecast.confidenceNote);

    const smartNote = $('#smart-forecast-note');
    smartNote.textContent = notes.join(' ');
    smartNote.classList.toggle('hidden', !notes.length);
  }

  function renderFertileStatus(forecast) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const fullStart = parseDate(forecast.fertileStart);
    const fullEnd = parseDate(forecast.fertileEnd);
    const likelyStart = parseDate(forecast.fertileLikelyStart);
    const likelyEnd = parseDate(forecast.fertileLikelyEnd);
    let status = '';

    if (isBetween(today, likelyStart, likelyEnd)) {
      status = 'Đang trong cửa sổ thụ thai có khả năng cao';
    } else if (isBetween(today, fullStart, fullEnd)) {
      status = 'Đang trong cửa sổ thụ thai dự đoán';
    } else if (fullStart && today < fullStart) {
      status = 'Bắt đầu sau ' + Math.round((fullStart - today) / 86400000) + ' ngày';
    } else if (fullEnd && today > fullEnd) {
      status = 'Cửa sổ dự đoán đã kết thúc';
    }

    $('#f-fertile-count').textContent = status;
  }

  function renderModeCard(forecast) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    if (viewMode === 'ttc') {
      const fertileStart = parseDate(forecast.fertileStart);
      const fertileEnd = parseDate(forecast.fertileEnd);
      const likelyStart = parseDate(forecast.fertileLikelyStart);
      const likelyEnd = parseDate(forecast.fertileLikelyEnd);
      let main = 'Theo dõi cửa sổ thụ thai';

      if (isBetween(today, likelyStart, likelyEnd)) {
        main = 'Đang ở cửa sổ thụ thai cao nhất';
      } else if (isBetween(today, fertileStart, fertileEnd)) {
        main = 'Đang trong cửa sổ thụ thai';
      } else if (fertileStart && today < fertileStart) {
        main = 'Cửa sổ thụ thai bắt đầu sau ' + daysBetween(fertileStart, today) + ' ngày';
      } else if (fertileEnd && today > fertileEnd) {
        main = 'Cửa sổ thụ thai kỳ này đã qua';
      }

      $('#mode-card-label').textContent = 'Trọng tâm thụ thai';
      $('#mode-main').textContent = main;
      $('#mode-support').textContent = 'Rụng trứng khả năng cao: ' + fmtShort(forecast.ovulationLikely) + '. Cao điểm dự đoán: ' + fmtShort(forecast.fertilePeakStart) + ' → ' + fmtShort(forecast.fertilePeakEnd) + '.';
      $('#mode-chip-a').textContent = countdownText(forecast.ovulationLikely, 'Rụng trứng') || 'Rụng trứng: —';
      $('#mode-chip-b').textContent = 'Dải trung tâm: ' + fmtShort(forecast.fertileLikelyStart) + ' → ' + fmtShort(forecast.fertileLikelyEnd);
      return;
    }

    const lastStart = parseDate(forecast.lastStart);
    const cycleDay = lastStart ? daysBetween(today, lastStart) + 1 : null;
    $('#mode-card-label').textContent = 'Trọng tâm chu kỳ';
    $('#mode-main').textContent = cycleDay && cycleDay > 0 ? 'Ngày thứ ' + cycleDay + ' của chu kỳ' : 'Theo dõi kỳ kinh tiếp theo';
    $('#mode-support').textContent = 'Kỳ kinh tiếp theo khả năng cao: ' + fmtShort(forecast.nextPeriodLikely) + '.';
    $('#mode-chip-a').textContent = countdownText(forecast.nextPeriodLikely, 'Bắt đầu') || 'Kỳ kinh: —';
    $('#mode-chip-b').textContent = 'Tin cậy: ' + (forecast.confidenceLabel || '—');
  }

  function renderCycleChart() {
    const chart = $('#cycle-chart');
    const empty = $('#cycle-chart-empty');
    const series = state.forecast && Array.isArray(state.forecast.cycleSeries)
      ? state.forecast.cycleSeries
      : [];
    chart.replaceChildren();

    if (!series.length) {
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    const maxDays = Math.max.apply(null, series.map(item => item.days).concat([35]));

    series.forEach((item, index) => {
      const wrap = document.createElement('div');
      wrap.className = 'chart-bar-wrap' + (item.isOutlier ? ' is-outlier' : '');
      wrap.title = fmtShort(item.from) + ' → ' + fmtShort(item.to) + ': ' + item.days + ' ngày';

      const value = document.createElement('div');
      value.className = 'chart-value';
      value.textContent = item.days;

      const bar = document.createElement('div');
      bar.className = 'chart-bar';
      bar.style.height = Math.max(18, Math.round((item.days / maxDays) * 124)) + 'px';

      const label = document.createElement('div');
      label.className = 'chart-label';
      label.textContent = fmtShort(item.to).slice(0, 5);

      wrap.append(value, bar, label);
      if (index === series.length - 1) wrap.classList.add('is-latest');
      chart.appendChild(wrap);
    });
  }

  function renderCalendar() {
    const grid = $('#cal-grid');
    grid.replaceChildren();
    if (!state.records.length) return;

    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    const monthNames = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
    $('#cal-title').textContent = monthNames[month] + ' ' + year;

    ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].forEach(label => {
      const cell = document.createElement('div');
      cell.className = 'cal-cell head';
      cell.textContent = label;
      grid.appendChild(cell);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const periods = state.records
      .map(record => ({ start: parseDate(record.start), end: parseDate(record.end) || parseDate(record.start) }))
      .filter(period => period.start);
    const forecast = state.forecast;
    const nextEarliest = forecast ? parseDate(forecast.nextPeriodEarliest) : null;
    const nextLikely = forecast ? parseDate(forecast.nextPeriodLikely) : null;
    const nextLatest = forecast ? parseDate(forecast.nextPeriodLatest) : null;
    const ovEarliest = forecast ? parseDate(forecast.ovulationEarliest) : null;
    const ovLikely = forecast ? parseDate(forecast.ovulationLikely) : null;
    const ovLatest = forecast ? parseDate(forecast.ovulationLatest) : null;
    const fertileStart = forecast ? parseDate(forecast.fertileStart) : null;
    const fertileEnd = forecast ? parseDate(forecast.fertileEnd) : null;
    const fertileLikelyStart = forecast ? parseDate(forecast.fertileLikelyStart) : null;
    const fertileLikelyEnd = forecast ? parseDate(forecast.fertileLikelyEnd) : null;

    for (let index = 0; index < firstDay; index++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell muted';
      grid.appendChild(cell);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement('div');
      const current = new Date(year, month, day);
      cell.className = 'cal-cell';
      cell.textContent = day;
      if (isSameDate(current, today)) cell.classList.add('today');

      if (periods.some(period => isBetween(current, period.start, period.end))) {
        cell.classList.add('period');
        cell.title = 'Hành kinh thực tế';
        grid.appendChild(cell);
        continue;
      }

      const predictedPeriodEnd = nextLatest ? new Date(nextLatest.getTime() + 5 * 86400000) : null;
      if (isBetween(current, nextEarliest, predictedPeriodEnd)) {
        const likely = isSameDate(current, nextLikely);
        cell.classList.add('predicted-period');
        if (likely) cell.classList.add('likely');
        cell.title = likely ? 'Kỳ kinh dự đoán, khả năng cao' : 'Kỳ kinh có thể xảy ra';
      }

      if (isBetween(current, fertileStart, fertileEnd)) {
        cell.classList.add('predicted-fertile');
        cell.title = 'Cửa sổ thụ thai, toàn dải';
      }

      if (isBetween(current, fertileLikelyStart, fertileLikelyEnd)) {
        cell.classList.remove('predicted-fertile');
        cell.classList.add('fertile');
        cell.title = 'Cửa sổ thụ thai, khả năng cao';
      }

      if (isBetween(current, ovEarliest, ovLatest)) {
        const likely = isSameDate(current, ovLikely);
        cell.classList.remove('fertile', 'predicted-fertile');
        cell.classList.add(likely ? 'ov' : 'predicted-ov');
        cell.title = likely ? 'Rụng trứng, khả năng cao' : 'Rụng trứng có thể xảy ra';
      }

      grid.appendChild(cell);
    }
  }

  $('#cal-prev').addEventListener('click', () => {
    calCursor.setMonth(calCursor.getMonth() - 1);
    renderCalendar();
  });

  $('#cal-next').addEventListener('click', () => {
    calCursor.setMonth(calCursor.getMonth() + 1);
    renderCalendar();
  });

  function renderHistory() {
    const list = $('#history-list');
    const count = $('#history-count');
    list.replaceChildren();
    count.textContent = state.records.length ? state.records.length + ' kỳ' : '';

    if (!state.records.length) {
      $('#history-empty').classList.remove('hidden');
      return;
    }

    $('#history-empty').classList.add('hidden');
    state.records.forEach(record => {
      const item = document.createElement('article');
      item.className = 'history-item';

      const main = document.createElement('div');
      main.className = 'history-item-main';

      const dates = document.createElement('div');
      dates.className = 'history-dates';
      dates.textContent = fmtShort(record.start) + (record.end ? ' → ' + fmtShort(record.end) : '');

      const meta = document.createElement('div');
      meta.className = 'history-meta';
      appendMetaItem(meta, 'Chu kỳ:', record.cycleDays + ' ngày');
      if (record.periodDays) appendMetaItem(meta, 'Hành kinh:', record.periodDays + ' ngày');
      if (record.ovulation) appendMetaItem(meta, 'Rụng trứng:', fmtShort(record.ovulation));

      main.append(dates, meta);
      if (record.notes) {
        const notes = document.createElement('div');
        notes.className = 'history-notes';
        notes.textContent = '“' + record.notes + '”';
        main.appendChild(notes);
      }

      const actions = document.createElement('div');
      actions.className = 'history-actions';
      const removeButton = document.createElement('button');
      removeButton.className = 'btn-delete';
      removeButton.type = 'button';
      removeButton.title = 'Xóa kỳ kinh';
      removeButton.setAttribute('aria-label', 'Xóa kỳ kinh ngày ' + fmtShort(record.start));
      removeButton.textContent = '×';
      removeButton.addEventListener('click', () => {
        if (!confirm('Xóa kỳ kinh ngày ' + fmtShort(record.start) + '?')) return;
        showOverlay(true);
        google.script.run
          .withSuccessHandler(data => applyData(data))
          .withFailureHandler(handleFailure)
          .deleteCycleEntry(record.rowIndex);
      });

      actions.appendChild(removeButton);
      item.append(main, actions);
      list.appendChild(item);
    });
  }

  $('#entry-form').addEventListener('submit', event => {
    event.preventDefault();
    const formData = new FormData(event.target);
    const payload = {
      start: formData.get('start'),
      end: formData.get('end'),
      notes: formData.get('notes') || ''
    };

    $('#form-msg').classList.add('hidden');
    setSaving(true);
    showOverlay(true);

    google.script.run
      .withSuccessHandler(data => {
        setSaving(false);
        applyData(data, function () {
          event.target.reset();
          setDefaults();
          showFormMessage('Đã lưu kỳ kinh thành công.', 'success');
          setTimeout(() => $('#form-msg').classList.add('hidden'), 3000);
          if (window.innerWidth < 768) switchPanel('forecast');
        });
      })
      .withFailureHandler(err => {
        setSaving(false);
        showOverlay(false);
        showFormMessage('Không thể lưu: ' + (err && err.message ? err.message : String(err)), 'error');
      })
      .addCycleEntry(payload);
  });

  $('#btn-refresh').addEventListener('click', load);

  function setDefaults() {
    const today = new Date();
    $('input[name=start]').value = today.toISOString().slice(0, 10);
  }

  applyMode();
  setSaving(false);
  setDefaults();
  load();
})();
</script>
