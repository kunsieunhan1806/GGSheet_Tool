<style>
:root {
  color-scheme: light;
  --brand-50: #fff7fa;
  --brand-100: #fde8f0;
  --brand-200: #f8cddd;
  --brand-400: #e56e9c;
  --brand-500: #d94d83;
  --brand-600: #b93d6e;
  --brand-700: #943057;
  --ovulation: #8b6dd4;
  --ovulation-soft: #f0ebff;
  --fertile: #39a99e;
  --fertile-soft: #e2f6f2;
  --warning: #d98b2b;
  --warning-soft: #fff4df;
  --success: #25866c;
  --danger: #b63e52;
  --canvas: #f8f5f7;
  --canvas-glow: #fffafd;
  --surface: #ffffff;
  --surface-soft: #fcf8fa;
  --surface-strong: #f4edf1;
  --text-primary: #342d32;
  --text-secondary: #745f6a;
  --text-muted: #9b8791;
  --border: #eadfe4;
  --border-strong: #dccbd3;
  --shadow-card: 0 12px 32px rgba(72, 43, 58, .08);
  --shadow-float: 0 18px 44px rgba(96, 45, 70, .14);
  --radius-xl: 24px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --header-height: 72px;
  --content-max: 1180px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--canvas);
  scroll-behavior: smooth;
}

body {
  min-width: 320px;
  min-height: 100vh;
  margin: 0;
  color: var(--text-primary);
  background:
    radial-gradient(circle at 10% 0%, rgba(217, 77, 131, .09), transparent 31rem),
    linear-gradient(180deg, var(--canvas-glow), var(--canvas) 34rem);
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button,
input,
textarea {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

button:focus-visible,
input:focus-visible,
textarea:focus-visible,
summary:focus-visible,
a:focus-visible {
  outline: 3px solid rgba(217, 77, 131, .34);
  outline-offset: 3px;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1,
h2,
h3 {
  color: var(--text-primary);
  letter-spacing: -.025em;
}

h2 {
  margin-bottom: 0;
  font-size: clamp(1.2rem, 2vw, 1.45rem);
  line-height: 1.25;
}

h3 {
  margin-bottom: 0;
  font-size: 1rem;
  line-height: 1.35;
}

.app-shell {
  min-height: 100vh;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 40;
  border-bottom: 1px solid rgba(234, 223, 228, .8);
  background: rgba(255, 250, 253, .88);
  box-shadow: 0 4px 18px rgba(72, 43, 58, .045);
  backdrop-filter: blur(16px);
}

.app-header-inner {
  width: min(100%, var(--content-max));
  min-height: var(--header-height);
  margin: 0 auto;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 11px;
}

.brand-mark {
  width: 42px;
  height: 42px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  color: #fff;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
  box-shadow: 0 8px 18px rgba(185, 61, 110, .22);
  font-size: 1.35rem;
}

.brand-copy {
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.brand-copy strong {
  overflow: hidden;
  font-size: 1rem;
  line-height: 1.25;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.brand-copy small {
  overflow: hidden;
  color: var(--text-secondary);
  font-size: .76rem;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.icon-button {
  width: 44px;
  height: 44px;
  padding: 0;
  display: inline-grid;
  place-items: center;
  flex: 0 0 auto;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  cursor: pointer;
  font-size: 1.35rem;
  line-height: 1;
  transition: color .18s ease, border-color .18s ease, background .18s ease, transform .18s ease;
}

.icon-button:hover {
  color: var(--brand-600);
  border-color: var(--brand-200);
  background: var(--brand-50);
  transform: translateY(-1px);
}

.app-layout {
  width: min(100%, var(--content-max));
  margin: 0 auto;
  padding: 20px 16px calc(104px + env(safe-area-inset-bottom));
}

.dashboard,
.side-rail,
.panel {
  min-width: 0;
}

.panel {
  animation: panel-in .24s ease both;
}

@keyframes panel-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.dashboard-toolbar {
  margin-bottom: 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--text-muted);
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: .1em;
  line-height: 1.3;
  text-transform: uppercase;
}

.mode-switch {
  min-width: 194px;
  padding: 4px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: 13px;
  background: var(--surface);
  box-shadow: 0 5px 16px rgba(72, 43, 58, .05);
}

.mode-btn {
  min-height: 38px;
  padding: 7px 12px;
  color: var(--text-secondary);
  border: 0;
  border-radius: 9px;
  background: transparent;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 800;
  transition: color .18s ease, background .18s ease, box-shadow .18s ease;
}

.mode-btn:hover:not(.active) {
  color: var(--brand-600);
  background: var(--brand-50);
}

.mode-btn.active {
  color: var(--brand-700);
  background: var(--brand-100);
  box-shadow: inset 0 0 0 1px rgba(217, 77, 131, .08);
}

body[data-mode="ttc"] .mode-btn.active {
  color: #176f68;
  background: var(--fertile-soft);
}

.dashboard-flow {
  display: grid;
  gap: 14px;
}

.today-card {
  position: relative;
  overflow: hidden;
  min-height: 206px;
  padding: 26px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 24px;
  color: #fff;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, #df5c90 0%, var(--brand-600) 72%, #963258 100%);
  box-shadow: var(--shadow-float);
  isolation: isolate;
}

.today-card::before,
.today-card::after {
  content: "";
  position: absolute;
  z-index: -1;
  border-radius: 50%;
  background: rgba(255, 255, 255, .1);
}

.today-card::before {
  width: 220px;
  height: 220px;
  top: -130px;
  right: -45px;
}

.today-card::after {
  width: 130px;
  height: 130px;
  right: 86px;
  bottom: -92px;
}

body[data-mode="ttc"] .today-card {
  background: linear-gradient(135deg, #52bdb2 0%, #278d84 70%, #176a64 100%);
  box-shadow: 0 18px 44px rgba(39, 141, 132, .18);
}

.today-card .eyebrow {
  color: rgba(255, 255, 255, .72);
}

.today-card h1 {
  max-width: 660px;
  margin: 0 0 8px;
  color: #fff;
  font-size: clamp(1.75rem, 5vw, 2.55rem);
  line-height: 1.08;
}

.today-card-copy > p:last-child {
  max-width: 620px;
  margin: 0;
  color: rgba(255, 255, 255, .82);
  font-size: .92rem;
}

.today-card-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.today-card-chips span {
  min-height: 32px;
  padding: 7px 10px;
  display: inline-flex;
  align-items: center;
  color: #fff;
  border: 1px solid rgba(255, 255, 255, .2);
  border-radius: 999px;
  background: rgba(255, 255, 255, .13);
  font-size: .76rem;
  font-weight: 750;
  backdrop-filter: blur(8px);
}

.warning-banner {
  padding: 15px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  color: #7d531d;
  border: 1px solid #f0d39e;
  border-radius: var(--radius-md);
  background: var(--warning-soft);
}

.warning-icon {
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  color: #fff;
  border-radius: 10px;
  background: var(--warning);
  font-weight: 900;
}

.warning-body strong {
  display: block;
  margin-bottom: 2px;
}

.warning-body p {
  margin: 0;
  font-size: .82rem;
  line-height: 1.55;
}

.warning-tip {
  margin-top: 6px !important;
  color: #8b622e;
}

.milestone-grid {
  display: grid;
  gap: 12px;
}

.milestone-card {
  --accent: var(--brand-500);
  --accent-soft: var(--brand-50);
  min-width: 0;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-card);
}

.ovulation-card {
  --accent: var(--ovulation);
  --accent-soft: var(--ovulation-soft);
}

.fertile-card {
  --accent: var(--fertile);
  --accent-soft: var(--fertile-soft);
}

body[data-mode="ttc"] .fertile-card { order: -2; }
body[data-mode="ttc"] .ovulation-card { order: -1; }

.milestone-heading {
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.milestone-icon {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  color: var(--accent);
  border-radius: 11px;
  background: var(--accent-soft);
  font-size: .9rem;
  font-weight: 900;
}

.milestone-heading .eyebrow {
  margin-bottom: 1px;
}

.date-range {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr) minmax(0, 1fr);
  gap: 7px;
}

.date-range > span {
  min-width: 0;
  min-height: 78px;
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface-soft);
}

.date-range small,
.date-range em {
  color: var(--text-muted);
  font-size: .62rem;
  font-style: normal;
  font-weight: 750;
  line-height: 1.2;
}

.date-range small {
  letter-spacing: .04em;
  text-transform: uppercase;
}

.date-range b {
  max-width: 100%;
  overflow: hidden;
  color: var(--text-primary);
  font-size: clamp(.78rem, 2.6vw, .94rem);
  line-height: 1.25;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.date-range .likely {
  border-color: color-mix(in srgb, var(--accent) 24%, var(--border));
  background: var(--accent-soft);
}

.date-range .likely b {
  color: var(--accent);
  font-size: clamp(.88rem, 2.9vw, 1.04rem);
}

.date-range .likely em {
  color: var(--accent);
}

.fertile-list {
  margin: 0;
  display: grid;
  gap: 8px;
}

.fertile-list > div {
  min-width: 0;
  padding: 10px 11px;
  display: grid;
  grid-template-columns: minmax(88px, .8fr) minmax(0, 1.2fr);
  align-items: center;
  gap: 10px;
  border-radius: 12px;
  background: var(--surface-soft);
}

.fertile-list .fertile-primary {
  background: var(--fertile-soft);
}

.fertile-list dt {
  color: var(--text-muted);
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.fertile-list dd {
  min-width: 0;
  margin: 0;
  overflow: hidden;
  color: var(--text-primary);
  font-size: .82rem;
  font-weight: 800;
  text-align: right;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fertile-primary dd {
  color: #18776f;
}

.fertile-status {
  min-height: 1.3em;
  margin: 10px 0 0;
  color: var(--text-secondary);
  font-size: .78rem;
  text-align: center;
}

.calendar-card,
.analysis-details,
.form-card,
.history-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-card);
}

.calendar-card {
  padding: 18px;
}

.calendar-header {
  margin-bottom: 12px;
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  gap: 8px;
}

.calendar-header h2 {
  text-align: center;
  font-size: 1.03rem;
}

.mini-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 5px;
}

.cal-cell {
  position: relative;
  aspect-ratio: 1;
  min-width: 0;
  display: grid;
  place-items: center;
  color: var(--text-secondary);
  border: 1px solid transparent;
  border-radius: 10px;
  background: var(--surface-soft);
  font-size: clamp(.68rem, 2.4vw, .82rem);
}

.cal-cell.head {
  aspect-ratio: auto;
  min-height: 28px;
  color: var(--text-muted);
  background: transparent;
  font-size: .65rem;
  font-weight: 800;
  text-transform: uppercase;
}

.cal-cell.muted {
  opacity: .25;
}

.cal-cell.today {
  border-color: var(--brand-500);
  box-shadow: inset 0 0 0 1px var(--brand-500);
  font-weight: 850;
}

.cal-cell.period,
.cal-cell.ov,
.cal-cell.fertile,
.cal-cell.predicted-period.likely,
.cal-cell.predicted-ov.likely {
  color: #fff;
  font-weight: 850;
}

.cal-cell.period,
.cal-cell.predicted-period.likely { background: var(--brand-500); }
.cal-cell.ov,
.cal-cell.predicted-ov.likely { background: var(--ovulation); }
.cal-cell.fertile { background: var(--fertile); }
.cal-cell.predicted-period { color: var(--brand-700); border-color: var(--brand-200); background: var(--brand-100); }
.cal-cell.predicted-ov { color: #6546ad; border-color: #d6c9ff; background: var(--ovulation-soft); }
.cal-cell.predicted-fertile { color: #176f68; border-color: #afe1da; background: var(--fertile-soft); }

.legend {
  margin-top: 14px;
  padding-top: 13px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border);
  font-size: .7rem;
}

.legend span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.dot {
  width: 9px;
  height: 9px;
  display: inline-block;
  border-radius: 50%;
}

.dot-period { background: var(--brand-500); }
.dot-period-pred { border: 1px dashed var(--brand-400); background: var(--brand-100); }
.dot-ov { background: var(--ovulation); }
.dot-fertile { background: var(--fertile); }

.analysis-details {
  overflow: hidden;
}

.analysis-details > summary {
  min-height: 52px;
  padding: 14px 50px 14px 18px;
  display: flex;
  align-items: center;
  position: relative;
  color: var(--text-primary);
  cursor: pointer;
  font-size: .88rem;
  font-weight: 850;
  list-style: none;
}

.analysis-details > summary::-webkit-details-marker {
  display: none;
}

.analysis-details > summary::after {
  content: "+";
  position: absolute;
  right: 18px;
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
  color: var(--brand-600);
  border-radius: 9px;
  background: var(--brand-100);
  font-size: 1.1rem;
  transition: transform .18s ease;
}

.analysis-details[open] > summary {
  border-bottom: 1px solid var(--border);
}

.analysis-details[open] > summary::after {
  content: "−";
  transform: rotate(180deg);
}

.analysis-content {
  padding: 18px;
}

.analysis-heading,
.chart-heading,
.section-heading-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.analysis-heading {
  align-items: flex-start;
}

.confidence-pill {
  padding: 6px 9px;
  display: inline-flex;
  align-items: center;
  flex: 0 0 auto;
  border-radius: 999px;
  font-size: .68rem;
  font-weight: 850;
}

.confidence-high { color: #176f58; background: #ddf3ea; }
.confidence-medium { color: #865a1f; background: var(--warning-soft); }
.confidence-low { color: var(--brand-700); background: var(--brand-100); }

.cycle-stats {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.stat {
  min-width: 0;
  padding: 12px 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface-soft);
}

.stat-num {
  color: var(--text-primary);
  font-size: 1.35rem;
  font-weight: 850;
  line-height: 1;
}

.stat-lbl {
  color: var(--text-muted);
  font-size: .61rem;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.stat-highlight {
  border-color: var(--brand-200);
  background: var(--brand-50);
}

.stat-highlight .stat-num {
  color: var(--brand-600);
}

.sample-note,
.smart-note,
.chart-empty {
  color: var(--text-secondary);
  font-size: .76rem;
}

.sample-note {
  margin: 10px 0 0;
  text-align: center;
}

.smart-note {
  margin: 12px 0 0;
  padding: 11px 12px;
  color: #7d531d;
  border: 1px solid #f0d39e;
  border-radius: 11px;
  background: var(--warning-soft);
}

.chart-heading {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.chart-heading small {
  color: var(--text-muted);
  font-size: .68rem;
}

.cycle-chart {
  min-height: 174px;
  padding: 16px 2px 5px;
  display: flex;
  align-items: flex-end;
  gap: 9px;
  overflow-x: auto;
  overscroll-behavior-inline: contain;
  border-bottom: 1px solid var(--border);
  scrollbar-width: thin;
}

.chart-bar-wrap {
  width: 42px;
  min-width: 42px;
  height: 154px;
  display: grid;
  grid-template-rows: 20px 124px 18px;
  align-items: end;
  justify-items: center;
  gap: 4px;
}

.chart-value,
.chart-label {
  font-size: .66rem;
  font-weight: 800;
}

.chart-value { align-self: start; color: var(--text-secondary); }
.chart-label { align-self: end; color: var(--text-muted); }

.chart-bar {
  width: 22px;
  min-height: 18px;
  border-radius: 7px 7px 3px 3px;
  background: linear-gradient(180deg, var(--brand-400), var(--brand-600));
  box-shadow: 0 7px 14px rgba(217, 77, 131, .16);
}

.chart-bar-wrap.is-latest .chart-bar {
  background: linear-gradient(180deg, #e4a24c, var(--warning));
}

.chart-bar-wrap.is-latest .chart-label {
  color: var(--warning);
}

.chart-bar-wrap.is-outlier .chart-bar {
  border: 2px dashed var(--text-muted);
  background: var(--surface-strong);
  box-shadow: none;
}

.chart-empty {
  margin: 12px 0 0;
}

.side-rail {
  display: contents;
}

.form-card,
.history-card {
  padding: 20px;
}

.section-heading {
  margin-bottom: 18px;
}

.section-heading > p:last-child {
  margin: 7px 0 0;
  color: var(--text-secondary);
  font-size: .8rem;
}

.field {
  margin-bottom: 14px;
  display: block;
}

.field > span {
  margin-bottom: 6px;
  display: block;
  color: var(--text-primary);
  font-size: .79rem;
  font-weight: 750;
}

.field > span em {
  color: var(--brand-500);
  font-style: normal;
}

.field input,
.field textarea {
  width: 100%;
  min-height: 46px;
  padding: 11px 12px;
  color: var(--text-primary);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  background: var(--surface-soft);
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}

.field textarea {
  min-height: 84px;
  resize: vertical;
}

.field input:hover,
.field textarea:hover {
  border-color: var(--brand-200);
}

.field input:focus,
.field textarea:focus {
  border-color: var(--brand-500);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(217, 77, 131, .11);
  outline: none;
}

.actions {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
  gap: 9px;
}

.btn {
  min-height: 46px;
  padding: 10px 14px;
  border: 1px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 850;
